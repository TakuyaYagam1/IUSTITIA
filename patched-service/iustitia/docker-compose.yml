services:
  iustitia-backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    container_name: iustitia-backend
    restart: unless-stopped
    environment:
      - HTTP_ADDR=:8080
      - DB_PATH=/data/iustitia.db
      - MIGRATIONS_DIR=/app/migrations
      - SECRETS_DIR=/app/secrets
      - JWT_SECRET=mtb-iustitia-v3-2189-tribunal-signing-key
      - JWT_TTL=1h
      - CORS_ORIGINS=*
      - ENV=prod
    volumes:
      - iustitia-data:/data
      - ./secrets:/app/secrets:ro
    networks:
      - iustitia-net
    ports:
      - "8080:8080"

  iustitia-frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
      # Patch F5 (Secrets leak в JS-бандл).
      # Raw-compose передавал в build-args три маркера:
      #   VITE_SERVICE_TOKEN:     "SECRET_MARKER_B_mtb_bundle_..."
      #   VITE_INTERNAL_HMAC_KEY: "SECRET_MARKER_K_mtb_internal_hmac_..."
      #   VITE_TRIBUNAL_SECRET:   "SECRET_MARKER_P_mtb_tribunal_parent_..."
      # Эти значения проходили цепочку ARG -> ENV -> import.meta.env -> vite define:
      # и в итоге инлайнились как string-literal в /assets/index-*.js, который
      # nginx раздаёт всем подряд (см. sploit.vuln_8 - ищет эти маркеры в бандле).
      # Фикс - убираем все три build-переменные из compose. В Dockerfile,
      # vite.config.ts, shared/config/service.ts, shared/crypto/hmac.ts и
      # pages/docgen/DocgenPage.tsx соответствующие точки инжекции вычищены.
      # Публичным остаётся только VITE_API_URL (пустая строка -> same-origin через
      # nginx-прокси) - это не секрет.
      args:
        VITE_API_URL: ""
    container_name: iustitia-frontend
    restart: unless-stopped
    depends_on:
      - iustitia-backend
    networks:
      - iustitia-net
    ports:
      - "8081:80"

networks:
  iustitia-net:
    driver: bridge

volumes:
  iustitia-data:
