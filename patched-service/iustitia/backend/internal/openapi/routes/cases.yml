    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/ComplaintCreateRequest'
    responses:
      '201':
        description: Создано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Complaint'
      '400':
        description: Невалидный ввод
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не citizen
        content:
          application/json:
