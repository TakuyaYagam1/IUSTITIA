# Cases, complaints, documents - одна бизнес-ветка.

# -------- Cases --------------------------------------------------------

list_cases:
  get:
    tags: [cases]
    summary: Список активных дел (пагинация)
    operationId: listCases
    parameters:
      - in: query
        name: limit
        schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      - in: query
        name: offset
        schema: { type: integer, default: 0, minimum: 0 }
      - in: query
        name: status
        required: false
        schema: { $ref: '../components/schemas.yml#/CaseStatus' }
      - in: query
        name: assigned_to
        required: false
        description: Фильтр по assigned_prosecutor_id (UUID)
        schema: { $ref: '../components/schemas.yml#/UUID' }
    responses:
      '200':
        description: Список
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/Case'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Нет прав (не judge/prosecutor)
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
  post:
    tags: [cases]
    summary: Создать новое дело (citizen)
    description: |
      Транзакционно создаёт case (status=draft, author_id=claims.user_id)
      и ПЕРВЫЙ complaint. Seq_num выдаётся автоматически.
    operationId: createCase
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/CaseCreateRequest'
    responses:
      '201':
        description: Создано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Case'
      '400':
        description: Невалидный ввод
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не citizen
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

case_by_id:
  parameters:
    - in: path
      name: id
      required: true
      schema: { $ref: '../components/schemas.yml#/UUID' }
  get:
    tags: [cases]
    summary: Получить дело по ID
    operationId: getCaseByID
    responses:
      '200':
        description: Дело
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Case'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Запрещено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

case_verdict:
  post:
    tags: [cases]
    summary: Вынести финальный приговор (только judge)
    description: |
      Транзакционно: (1) генерит Document через docgen по шаблону verdict;
      (2) переводит case в status=closed + выставляет verdict;
      (3) вставляет запись в archive. Требует case.status=='hearing' и
      наличие filed opinion.
    operationId: setCaseVerdict
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '../components/schemas.yml#/UUID' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/VerdictRequest'
    responses:
      '200':
        description: Приговор вынесен, дело закрыто и заархивировано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/VerdictResult'
      '400':
        description: Невалидный вердикт или статус
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не judge
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

case_search:
  post:
    tags: [cases]
    summary: Поиск дел с сортировкой
    operationId: searchCases
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/SearchRequest'
    responses:
      '200':
        description: Результаты
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/Case'
      '400':
        description: Невалидный запрос
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

# -------- Complaints ---------------------------------------------------

