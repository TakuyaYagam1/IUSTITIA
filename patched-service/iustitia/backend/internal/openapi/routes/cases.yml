        application/json:
          schema:
            $ref: '../components/schemas.yml#/DocumentGenerateRequest'
    responses:
      '200':
        description: Документ создан
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Document'
      '400':
        description: Невалидный шаблон
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не prosecutor
        content:
          application/json:
            schema:
