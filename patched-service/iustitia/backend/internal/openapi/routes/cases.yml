    responses:
      '200':
        description: Список доносов
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/Complaint'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Запрещено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

complaint_evidence:
  post:
    tags: [complaints]
    summary: Прикрепить улику по URL (prosecutor)
    operationId: attachEvidence
    parameters:
      - in: path
        name: id
        required: true
        description: complaint id
        schema: { $ref: '../components/schemas.yml#/UUID' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/EvidenceRequest'
    responses:
      '200':
        description: Улика прикреплена
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Complaint'
      '400':
        description: Невалидный URL
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не prosecutor
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Донос не найден
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

