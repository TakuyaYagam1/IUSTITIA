        name: id
        required: true
        schema: { $ref: '../components/schemas.yml#/UUID' }
    responses:
      '200':
        description: Список документов
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/Document'
      '401':
        description: Неавторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не judge
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Дело не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

# -------- Trial workflow -----------------------------------------------

case_accept:
  post:
    tags: [cases]
    summary: Принять дело в производство и назначить прокурора (registrar)
    description: |
      Валидация: case.status=='draft', user(prosecutor_id).role=='prosecutor'.
      Переводит дело в status=assigned, проставляет assigned_prosecutor_id.
    operationId: acceptCase
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '../components/schemas.yml#/UUID' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/CaseAcceptRequest'
    responses:
      '200':
        description: Дело принято
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/Case'
      '400':
        description: Невалидный статус или прокурор
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не registrar
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Дело не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

case_dismiss:
  post:
    tags: [cases]
    summary: Бюрократически отклонить дело без суда (registrar)
    description: |
      Валидация: case.status in ('draft','open'). Удаляет дело из БД.
    operationId: dismissCase
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '../components/schemas.yml#/UUID' }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/CaseDismissRequest'
    responses:
      '200':
        description: Дело удалено
        content:
          application/json:
            schema:
              type: object
              required: [ok]
              properties:
                ok:
                  type: boolean
      '400':
        description: Невалидный статус
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не registrar
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Дело не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'

case_opinion:
  parameters:
    - in: path
      name: id
      required: true
      schema: { $ref: '../components/schemas.yml#/UUID' }
  post:
    tags: [cases]
    summary: Подать предварительное заключение прокурора (prosecutor)
    description: |
      Валидация: case.status=='assigned' AND case.assigned_prosecutor_id==claims.user_id.
      Транзакция: INSERT case_opinions, UPDATE cases SET status='hearing'.
    operationId: fileOpinion
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/OpinionCreateRequest'
    responses:
      '201':
        description: Заключение подано, дело перешло в слушания
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/CaseOpinion'
      '400':
        description: Невалидный ввод или статус
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '403':
        description: Не prosecutor / не назначен на это дело
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Дело не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '409':
        description: Заключение уже подано
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
  get:
    tags: [cases]
    summary: Получить заключение прокурора по делу (judge/prosecutor)
    operationId: getCaseOpinion
    responses:
      '200':
        description: Заключение
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/CaseOpinion'
      '403':
        description: Запрещено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
      '404':
        description: Заключение не найдено
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/ErrorResponse'
