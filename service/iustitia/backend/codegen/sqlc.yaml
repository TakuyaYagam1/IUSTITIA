version: "2"

sql:
  - engine: "sqlite"
    queries: "../queries"
    schema: "../migrations"
    gen:
      go:
        package: "sqlc"
        out: "../internal/repo/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "DATETIME"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "DATETIME"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
